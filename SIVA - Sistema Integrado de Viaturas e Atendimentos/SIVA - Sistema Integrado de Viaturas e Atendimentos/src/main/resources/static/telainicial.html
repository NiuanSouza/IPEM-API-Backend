<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Connect - Home</title>
    <link rel="stylesheet" href="css/telainicial.css">
</head>
<body class="pagina-telainicial">
<div class="top-bar">
    <div class="left">
        <button id="btnmenu"><img src="img/menu.png" alt="menu"></button>
        <span class="titulo" id="boas-vindas">Bem vindo!</span>
    </div>
    <div class="logout">
        <button id="btnlogout" onclick="btnlogout()"><img src="img/logout.png" alt="logout"></button>
    </div>
</div>

<div class="notificacao-bar" onclick="window.location.href='chamados.html';">
    <img src="img/bell.png" class="bell">
    <span>Você possui solicitações de serviço!</span>
    <div class="badge">!</div>
</div>

<div class="quadros-container">
    <div class="quadro-esquerdo">
        <h3>Informações do Veículo</h3>
        <div id="info-veiculo">
            <p>Nenhum veículo selecionado.</p>
        </div>
        <div class="campos-adicionais">
            <label for="quilometragem-atual">Quilometragem Atual:</label>
            <input type="number" id="quilometragem-atual" step="0.1" placeholder="0.0">

            <label for="observacoes">Observações:</label>
            <textarea id="observacoes" placeholder="Relate o estado do veículo ou do serviço..."></textarea>

            <button id="btn-salvar-veiculo" onclick="salvarVeiculoInfo()">Salvar Informações</button>
        </div>
    </div>

    <div class="quadro-direito">
        <h3>Chamado Atual</h3>
        <div id="info-chamado">
            <p>Nenhum chamado ativo no momento.</p>
        </div>
        <button id="btn-checkout" onclick="checkoutChamado()">Checkout</button>
    </div>
</div>

<div id="overlayBlurSidebar" class="overlay-blur-sidebar"></div>
<div id="sidebar" class="sidebar">
    <button id="btnx" class="close-btn">×</button>
    <a href="chamados.html">CHAMADOS</a>
    <a href="#">DÚVIDAS</a>
    <a href="#">CONFIGURAÇÕES</a>
</div>

<script src="js/script.js"></script>
</body>
</html>
